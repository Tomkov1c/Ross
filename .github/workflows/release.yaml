name: Release

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64

          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            label: windows-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Read Cargo.toml metadata
        shell: bash
        run: |
          echo "PKG_NAME=$(grep '^name' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')" >> $GITHUB_ENV
          echo "PKG_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')" >> $GITHUB_ENV

      - name: Install aarch64 Linux cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          IS_WIN=${{ runner.os == 'Windows' && 'true' || 'false' }}
          EXT=$([[ "$IS_WIN" == "true" ]] && echo ".exe" || echo "")
          SRC="target/${{ matrix.target }}/release/${PKG_NAME}${EXT}"
          DEST="${PKG_NAME}-${{ matrix.label }}-v${PKG_VERSION}${EXT}"
          mv "$SRC" "$DEST"
          echo "ARTIFACT=$DEST" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ env.ARTIFACT }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Cargo.toml metadata
        run: |
          echo "PKG_NAME=$(grep '^name' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')" >> $GITHUB_ENV
          echo "PKG_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')" >> $GITHUB_ENV

      - name: Extract changelog for this version
        run: |
          awk "/^## \[v?${PKG_VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            .github/CHANGELOG.md > release_notes.md

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.PKG_VERSION }}
          name: ${{ env.PKG_NAME }} v${{ env.PKG_VERSION }}
          body_path: release_notes.md
          files: artifacts/*